<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Proyecto | William Gutierrez</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    
    <style>
        :root {
            --primary: #00f2ff; 
            --bg: #02040a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(80px); opacity: 0.15; }

        .container { max-width: 1600px; margin: 0 auto; width: 100%; padding: 3% 5%; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 10px;
            color: var(--primary); text-decoration: none; font-family: 'Unbounded';
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            margin-bottom: 2rem; transition: 0.3s; cursor: pointer;
        }
        .btn-back:hover { letter-spacing: 2px; color: #fff; }

        .project-grid { 
            display: grid; 
            grid-template-columns: 0.6fr 1.4fr; 
            gap: 4rem; 
            align-items: flex-start; 
        }

        .project-header h1 { font-family: 'Unbounded'; font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; margin-bottom: 1.5rem; }
        .meta-item span { display: block; font-size: 0.6rem; color: var(--primary); font-family: 'Unbounded'; margin-bottom: 5px; opacity: 0.6; }
        .meta-item p { font-weight: 700; font-size: 1rem; margin-bottom: 1.5rem; }

        .content-section { margin-bottom: 2.5rem; }
        .content-section h2 { font-family: 'Unbounded'; font-size: 0.7rem; color: var(--primary); margin-bottom: 1rem; letter-spacing: 1px; }
        .content-section p { color: var(--text-dim); line-height: 1.8; font-size: 1.1rem; max-width: 90%; }

        .activity-list { list-style: none; padding: 0; }
        .activity-item { 
            display: flex; align-items: flex-start; gap: 12px;
            color: var(--text-dim); margin-bottom: 12px; line-height: 1.6;
            font-size: 1rem;
        }
        .activity-item i { color: var(--primary); font-size: 0.8rem; margin-top: 5px; opacity: 0.8; }

        .visual-container { display: flex; justify-content: flex-start; align-items: center; width: 100%; position: sticky; top: 5%; }

        .phone-frame {
            width: 320px; height: 650px; background: #000; border: 12px solid #1a1a1a;
            border-radius: 45px; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            overflow: hidden; display: none; margin: 0 auto;
        }
        .desktop-frame {
            width: 135%; aspect-ratio: 16/10; background: #000; border: 12px solid #222;
            border-radius: 24px; position: relative; box-shadow: 0 80px 150px rgba(0,0,0,0.9);
            overflow: hidden; display: none; transform: translateX(-8%);
        }

        .screen-carousel { width: 100%; height: 100%; position: relative; display: flex; transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1); }
        .screen-carousel img { width: 100%; height: 100%; object-fit: contain; background-color: #000; flex-shrink: 0; }

        .touch-area { position: absolute; top: 0; width: 30%; height: 100%; z-index: 5; cursor: pointer; }
        .touch-left { left: 0; }
        .touch-right { right: 0; }

        .language-selector { position: fixed; bottom: 30px; right: 30px; z-index: 10000; }
        #lang-btn {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); padding: 12px 20px;
            border-radius: 50px; color: white; font-family: 'Unbounded';
            font-size: 0.7rem; display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.3s;
        }

        @media (max-width: 1300px) {
            .desktop-frame { width: 100%; transform: none; }
            .project-grid { grid-template-columns: 1fr; gap: 3rem; }
            .visual-container { justify-content: center; position: relative; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="language-selector">
        <button id="lang-btn" onclick="toggleLanguage()">
            <span class="fi fi-us" id="lang-flag"></span>
            <span id="lang-text">ENGLISH</span>
        </button>
    </div>

    <div class="container">
        <a href="index.html" class="btn-back" id="back-to-index">
            <i class="fas fa-arrow-left"></i> <span data-key="back">Volver a portafolio</span>
        </a>

        <div class="project-grid">
            <div class="info-col">
                <header class="project-header">
                    <h1 id="p-title">-</h1>
                    <div class="meta-item"><span data-key="label_tech">TECNOLOGÍAS</span><p id="p-stack">-</p></div>
                    <div class="meta-item"><span data-key="label_role">MI ROL</span><p id="p-role">-</p></div>
                </header>

                <section class="content-section">
                    <h2 data-key="label_logic">LÓGICA_CORE</h2>
                    <p id="p-desc">-</p>
                </section>

                <section class="content-section">
                    <h2 data-key="label_contrib">CONTRIBUCIONES_CLAVE</h2>
                    <ul class="activity-list" id="p-activities"></ul>
                </section>
            </div>

            <div class="visual-container">
                <div class="phone-frame" id="frame-mobile">
                    <div class="touch-area touch-left" onclick="moveSlide(-1)"></div>
                    <div class="touch-area touch-right" onclick="moveSlide(1)"></div>
                    <div class="screen-carousel" id="carousel-mobile"></div>
                </div>

                <div class="desktop-frame" id="frame-desktop">
                    <div class="touch-area touch-left" onclick="moveSlide(-1)"></div>
                    <div class="touch-area touch-right" onclick="moveSlide(1)"></div>
                    <div class="screen-carousel" id="carousel-desktop"></div>
                </div>
            </div>
        </div>
    </div>

                "dentist": {

                    desc: "Developed a native Android mobile application to manage dental clinic appointments. It includes a notification and reminder system, along with oral hygiene tips.",
                    isMobile: true,
                    activities: ["Scalable MVVM architecture design.", "Firebase integration for appointment control.", "Automated testing of critical components.", "CRUD development for appointment creation.", "Push notification integration for appointment reminders and hygiene tips."],

                "privatikaL": {
                    title: "Privatika Landing", stack: "vite.js / Tailwind CSS", role: "Frontend Developer",
                    desc: "Developed a high-performance landing page for Privatika, SEO-optimized using Vite.js and Tailwind CSS for a smooth and engaging user experience.",
                    isMobile: false,
                    activities: ["Reusable UI component development.", "SEO and Core Web Vitals optimization.", "Implementation of smooth animations.", "REST API consumption for email dispatch."],

                },
                "privatika": {
                    title: "Privatika App", stack: "vite.js / Tailwind CSS", role: "Frontend Developer",
                    desc: "Developed a robust administrative panel for managing website Terms and Conditions. Responsible for the entire dashboard frontend.",
                    isMobile: false,
                    activities: ["Interactive Dashboard development.", "Complex global state management.", "Role and permission system implementation.", "REST API consumption for user creation, terms management, and app connection keys."],
                    images: ["images/30.jpg", "images/31.jpg", "images/32.jpg", "images/33.jpg"]
                },
                "skyfleeter": {
                    title: "Skyfleeter", stack: ".NET / C# / SQL", role: "Full Stack Developer",
                    desc: "Enterprise solution for advanced fleet monitoring. I developed several activities within the web application. Due to confidentiality, screenshots are limited but can be shown during technical interviews.",
                    isMobile: false,
                    activities: ["Support ticket system creation.", "QR code generation for equipment and inspections.", "PDF generation with integrated QR codes.", "Email notification system for vehicle maintenance/inspections.", "Driver documentation management system.", "Mobile app for trip tracking with real-time geolocation and route control."],
                    images: ["images/34.jpg"]
                }
            }
        };

        const uiTexts = {
            es: { back: "Volver a portafolio", label_tech: "TECNOLOGÍAS", label_role: "MI ROL", label_logic: "LÓGICA_CORE", label_contrib: "CONTRIBUCIONES_CLAVE", lang_btn: "ENGLISH", lang_flag: "fi fi-us" },
            en: { back: "Back to Portfolio", label_tech: "TECHNOLOGIES", label_role: "MY ROLE", label_logic: "CORE_LOGIC", label_contrib: "KEY_CONTRIBUTIONS", lang_btn: "ESPAÑOL", lang_flag: "fi fi-sv" }
        };

        let currentLang = new URLSearchParams(window.location.search).get('lang') || 'es';
        let currentIndex = 0;
        let totalImages = 0;
        let activeTrack = null;

        function updateBackBtn() {
            document.getElementById('back-to-index').href = `index.html?lang=${currentLang}`;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id') || 'muravi';
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?id=${projectId}&lang=${currentLang}`;
            window.history.pushState({path:newUrl},'',newUrl);
            
            gsap.to(".info-col", { opacity: 0, x: -20, duration: 0.3, onComplete: () => {
                loadProjectContent();
                gsap.to(".info-col", { opacity: 1, x: 0, duration: 0.3 });
            }});
        }

        function loadProjectContent() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id') || 'muravi';
            const data = projectsData[currentLang][projectId];

            updateBackBtn();

            // Traducción de UI
            document.querySelectorAll('[data-key]').forEach(el => {
                el.innerText = uiTexts[currentLang][el.getAttribute('data-key')];
            });
            document.getElementById('lang-text').innerText = uiTexts[currentLang].lang_btn;
            document.getElementById('lang-flag').className = uiTexts[currentLang].lang_flag;

            // Datos del Proyecto
            document.getElementById('p-title').innerText = data.title;
            document.getElementById('p-stack').innerText = data.stack;
            document.getElementById('p-role').innerText = data.role;
            document.getElementById('p-desc').innerText = data.desc;

            const activityContainer = document.getElementById('p-activities');
            activityContainer.innerHTML = "";
            data.activities.forEach(act => {
                const li = document.createElement('li');
                li.className = "activity-item";
                li.innerHTML = `<i class="fas fa-chevron-right"></i> <span>${act}</span>`;
                activityContainer.appendChild(li);
            });

            // Frame logic
            const frameId = data.isMobile ? 'frame-mobile' : 'frame-desktop';
            const trackId = data.isMobile ? 'carousel-mobile' : 'carousel-desktop';
            
            document.getElementById('frame-mobile').style.display = 'none';
            document.getElementById('frame-desktop').style.display = 'none';
            
            const activeFrame = document.getElementById(frameId);
            activeTrack = document.getElementById(trackId);
            activeFrame.style.display = 'block';

            // Siempre recargamos el carrusel para evitar errores de cambio de proyecto
            activeTrack.innerHTML = "";
            totalImages = data.images.length;
            currentIndex = 0;
            gsap.set(activeTrack, { x: "0%" });
            
            data.images.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                activeTrack.appendChild(img);
            });
        }

        function moveSlide(direction) {
            if (totalImages <= 1) return;
            currentIndex = (currentIndex + direction + totalImages) % totalImages;
            gsap.to(activeTrack, { x: `-${currentIndex * 100}%`, duration: 0.8, ease: "power3.out" });
        }

        loadProjectContent();

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.05)';
            ctx.beginPath(); ctx.arc(canvas.width*0.8, canvas.height*0.5, 400, 0, Math.PI*2); ctx.fill();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
